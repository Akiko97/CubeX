[engine]
name = "wasm-record-store-example"
max_messages = 32

[store]
path = "events.bin"
replay_on_start = false

[[plugins]]
name = "wasm-record-source"
wasm = "../../target/wasm32-unknown-unknown/debug/cubex_wasm_record_source_plugin.wasm"
args = ["demo-record", "stored through CubeX wasm"]
autostart = true

[[plugins]]
name = "wasm-record-store"
wasm = "../../target/wasm32-unknown-unknown/debug/cubex_wasm_record_store_plugin.wasm"
working_dir = "."
args = ["records.bin"]

[[plugins.capabilities]]
kind = "record-store"
path = "records.bin"

[[plugins]]
name = "wasm-print"
wasm = "../../target/wasm32-unknown-unknown/debug/cubex_wasm_print_plugin.wasm"

[[routes]]
name = "wasm-records-to-store"
source = "wasm-record-source"
topic = "record.put"
payload = "record"
to = ["wasm-record-store"]

[[routes]]
name = "wasm-store-acks-to-print"
source = "wasm-record-store"
topic = "record.stored"
payload = "text"
to = ["wasm-print"]
